name: Bug report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please don't include secrets (tokens, keys, the
        contents of `.env`). If this is a security issue, see SECURITY.md instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click / submit ...
        3. See error ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Sign-in / Slack OAuth
        - Form submission
        - Google Sheets write
        - Slack notification
        - Slack Photo tool
        - Docs
        - Deploy / Cloudflare
        - Other
    validations:
      required: true
  - type: dropdown
    id: where
    attributes:
      label: Environment
      options:
        - Local dev (npm run dev)
        - Production (Cloudflare)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / errors
      description: Paste console or server output. Redact any secrets first.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. main @ abc1234
