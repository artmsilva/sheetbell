name: Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketches, API shapes, or examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Fit with the project
      options:
        - label: This keeps deployment values configurable (no new hardcoded IDs/secrets).
        - label: This stays Cloudflare/Web-Crypto compatible (no Node-only APIs).
