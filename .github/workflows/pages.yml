name: docs-pages

# Builds the documentation as a static site and deploys it to GitHub Pages.
# Pages must be enabled with "Source: GitHub Actions" (Settings → Pages). For a
# private repo, Pages requires a paid plan; on a public repo it works on the free
# plan. If you rename the repo, update PAGES_BASE to "/<new-name>".

on:
  push:
    branches: [main]
    paths:
      - "src/pages/docs/**"
      - "src/layouts/DocsLayout.astro"
      - "src/index.css"
      - "astro.pages.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: /sheetbell
      PAGES_SITE: https://artmsilva.github.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Assemble isolated docs source
        run: |
          rm -rf .pages-src
          mkdir -p .pages-src/pages
          cp -R src/pages/docs .pages-src/pages/docs
          cp -R src/layouts .pages-src/layouts
          cp src/index.css .pages-src/index.css
      - name: Build static docs
        run: npx astro build --config astro.pages.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
